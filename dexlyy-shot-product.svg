<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 640" role="img" aria-labelledby="title desc">
  <title id="title">DexlyyShot app interface mockup</title>
  <desc id="desc">A DexlyyShot desktop capture interface with selection overlay, annotation toolbar, recent captures, and AI prompt.</desc>
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#19120e"/>
      <stop offset=".52" stop-color="#3b281b"/>
      <stop offset="1" stop-color="#f5e6cf"/>
    </linearGradient>
    <linearGradient id="cream" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#fffaf1"/>
      <stop offset="1" stop-color="#ead9bf"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" x2="1">
      <stop offset="0" stop-color="#d97706"/>
      <stop offset="1" stop-color="#9a4f1e"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="150%">
      <feDropShadow dx="0" dy="28" stdDeviation="25" flood-color="#120905" flood-opacity=".34"/>
    </filter>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="22"/>
    </filter>
  </defs>

  <rect width="1024" height="640" fill="url(#bg)"/>
