<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 640" role="img" aria-labelledby="title desc">
  <title id="title">Dexlyy Voice app interface mockup</title>
  <desc id="desc">A Dexlyy Voice desktop app interface with transcript, waveform, language tools, and microphone controls.</desc>
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#fbf3e4"/>
      <stop offset=".56" stop-color="#ead8bc"/>
      <stop offset="1" stop-color="#2b2018"/>
    </linearGradient>
    <linearGradient id="panel" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#fffdfa"/>
      <stop offset="1" stop-color="#f2e7d6"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" x2="1">
      <stop offset="0" stop-color="#d97706"/>
      <stop offset="1" stop-color="#9a4f1e"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="150%">
      <feDropShadow dx="0" dy="26" stdDeviation="24" flood-color="#2b1606" flood-opacity=".28"/>
    </filter>
    <filter id="soft" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="18"/>
    </filter>
  </defs>

  <rect width="1024" height="640" fill="url(#bg)"/>
  <circle cx="776" cy="104" r="132" fill="#d97706" opacity=".18" filter="url(#soft)"/>
  <circle cx="224" cy="510" r="170" fill="#fff6e6" opacity=".55" filter="url(#soft)"/>

  <g filter="url(#shadow)">
    <rect x="96" y="72" width="832" height="496" rx="28" fill="#2a211a"/>
    <rect x="118" y="96" width="788" height="448" rx="18" fill="url(#panel)"/>
    <rect x="118" y="96" width="72" height="448" rx="18" fill="#2d241d"/>
    <rect x="176" y="96" width="14" height="448" fill="#2d241d"/>

    <circle cx="150" cy="126" r="5" fill="#d97706"/>
    <circle cx="166" cy="126" r="5" fill="#e8caa0"/>
    <circle cx="182" cy="126" r="5" fill="#8f724d"/>

    <g fill="none" stroke="#f5ead8" stroke-width="2" opacity=".8">
      <path d="M148 178h16v16h-16z"/>
      <path d="M148 234h16v16h-16z"/>
      <path d="M148 290h16v16h-16z"/>
      <path d="M148 346h16v16h-16z"/>
    </g>

    <rect x="226" y="130" width="444" height="54" rx="16" fill="#fffaf3" stroke="#eadcc8"/>
    <text x="252" y="162" font-family="Hanken Grotesk, Segoe UI, sans-serif" font-size="16" font-weight="700" fill="#3a2a1d">Live Dictation</text>
    <rect x="516" y="146" width="122" height="22" rx="11" fill="#f2e2cc"/>
    <text x="536" y="162" font-family="Hanken Grotesk, Segoe UI, sans-serif" font-size="11" font-weight="700" fill="#a45c24">AUTO DETECT</text>

    <rect x="226" y="208" width="444" height="250" rx="20" fill="#fffdf9" stroke="#eadcc8"/>
    <text x="254" y="246" font-family="Hanken Grotesk, Segoe UI, sans-serif" font-size="13" fill="#917d65">00:12</text>
    <text x="316" y="246" font-family="Fraunces, Georgia, serif" font-size="22" fill="#36281e">Turn this meeting into a clean follow-up note.</text>
    <text x="254" y="300" font-family="Hanken Grotesk, Segoe UI, sans-serif" font-size="13" fill="#917d65">00:20</text>
    <text x="316" y="300" font-family="Hanken Grotesk, Segoe UI, sans-serif" font-size="17" fill="#594736">Action items are detected as you speak.</text>
    <text x="254" y="352" font-family="Hanken Grotesk, Segoe UI, sans-serif" font-size="13" fill="#917d65">00:31</text>
    <text x="316" y="352" font-family="Hanken Grotesk, Segoe UI, sans-serif" font-size="17" fill="#594736">Translation and tone cleanup stay one click away.</text>
    <rect x="316" y="386" width="206" height="28" rx="14" fill="#f5eadb"/>
    <text x="338" y="405" font-family="Hanken Grotesk, Segoe UI, sans-serif" font-size="12" font-weight="700" fill="#9b5520">POLISH AS EMAIL</text>

    <path d="M254 504c8-40 16-40 24 0s16 40 24 0 16-40 24 0 16 40 24 0 16-40 24 0 16 40 24 0 16-40 24 0 16 40 24 0 16-40 24 0 16 40 24 0 16-40 24 0 16 40 24 0 16-40 24 0 16 40 24 0" fill="none" stroke="#c87835" stroke-width="5" stroke-linecap="round" opacity=".72"/>
    <rect x="226" y="486" width="444" height="42" rx="21" fill="#fff9f0" opacity=".75"/>

    <rect x="706" y="130" width="154" height="140" rx="18" fill="#fffaf3" stroke="#eadcc8"/>
    <text x="728" y="162" font-family="Hanken Grotesk, Segoe UI, sans-serif" font-size="13" font-weight="700" fill="#392c21">AI Clean-up</text>
    <rect x="728" y="184" width="86" height="8" rx="4" fill="#d9c7ae"/>
    <rect x="728" y="206" width="104" height="8" rx="4" fill="#e5d5c0"/>
    <rect x="728" y="228" width="70" height="8" rx="4" fill="#e5d5c0"/>

    <rect x="706" y="292" width="154" height="166" rx="18" fill="#fffaf3" stroke="#eadcc8"/>
    <text x="728" y="324" font-family="Hanken Grotesk, Segoe UI, sans-serif" font-size="13" font-weight="700" fill="#392c21">Languages</text>
    <g font-family="Hanken Grotesk, Segoe UI, sans-serif" font-size="12" font-weight="700">
      <rect x="728" y="344" width="42" height="28" rx="14" fill="#f2e2cc"/><text x="740" y="362" fill="#9b5520">EN</text>
      <rect x="780" y="344" width="42" height="28" rx="14" fill="#f6efe4"/><text x="793" y="362" fill="#8a765f">FR</text>
      <rect x="728" y="384" width="42" height="28" rx="14" fill="#f6efe4"/><text x="740" y="402" fill="#8a765f">ES</text>
      <rect x="780" y="384" width="42" height="28" rx="14" fill="#f6efe4"/><text x="793" y="402" fill="#8a765f">DE</text>
    </g>

    <circle cx="674" cy="488" r="46" fill="url(#accent)"/>
    <circle cx="674" cy="488" r="58" fill="none" stroke="#d97706" stroke-opacity=".28" stroke-width="12"/>
    <path d="M674 462c-10 0-18 8-18 18v16c0 10 8 18 18 18s18-8 18-18v-16c0-10-8-18-18-18zM644 494c0 17 13 30 30 30s30-13 30-30M674 524v20M656 544h36" fill="none" stroke="#fff8ef" stroke-width="6" stroke-linecap="round"/>
  </g>
</svg>
