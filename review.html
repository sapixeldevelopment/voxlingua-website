<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Live review — Dexlyy Shot</title>
  <meta name="robots" content="noindex" />
  <link rel="icon" type="image/png" href="logo-mark.png" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,600&family=Hanken+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg: #0c0b0a;
      --bg-elevated: #141210;
      --panel: rgba(22, 20, 17, 0.92);
      --panel-border: rgba(255, 248, 239, 0.07);
      --text: #f6efe6;
      --muted: rgba(246, 239, 230, 0.52);
      --faint: rgba(246, 239, 230, 0.32);
      --accent: #e8923a;
      --accent-glow: rgba(232, 146, 58, 0.22);
      --select: #2b9fff;
      --select-glow: rgba(43, 159, 255, 0.2);
      --radius: 14px;
      --radius-sm: 10px;
      --font-display: "Fraunces", Georgia, serif;
      --font-body: "Hanken Grotesk", system-ui, sans-serif;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: var(--font-body);
      background: var(--bg);
      color: var(--text);
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      pointer-events: none;
      background:
        radial-gradient(ellipse 80% 50% at 10% -10%, rgba(232, 146, 58, 0.09), transparent 55%),
        radial-gradient(ellipse 60% 40% at 90% 0%, rgba(43, 159, 255, 0.06), transparent 50%);
      z-index: 0;
    }

    body > * { position: relative; z-index: 1; }

    .topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 20px;
      padding: 12px 22px;
      border-bottom: 1px solid var(--panel-border);
      background: rgba(12, 11, 10, 0.88);
      backdrop-filter: blur(16px);
      flex-shrink: 0;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 11px;
      text-decoration: none;
      color: var(--text);
    }
    .brand img { width: 30px; height: 30px; border-radius: 8px; }
    .brand__text {
      font-family: var(--font-display);
      font-size: 17px;
      font-weight: 600;
      letter-spacing: -0.02em;
    }
    .brand__text em { color: var(--accent); font-style: normal; }

    .topbar__meta { text-align: right; min-width: 0; }
    .topbar__right {
      display: flex;
      align-items: center;
      gap: 14px;
      min-width: 0;
    }
    .offline-dl-btn {
      flex-shrink: 0;
      display: inline-flex;
      align-items: center;
      gap: 7px;
      padding: 8px 14px;
      border-radius: 999px;
      border: 1px solid rgba(255, 255, 255, 0.1);
      background: rgba(255, 255, 255, 0.04);
      color: var(--text);
      font: inherit;
      font-size: 12px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.12s, border-color 0.12s, opacity 0.12s;
    }
    .offline-dl-btn:hover:not(:disabled) {
      background: rgba(232, 146, 58, 0.12);
      border-color: rgba(232, 146, 58, 0.35);
    }
    .offline-dl-btn:disabled {
      opacity: 0.55;
      cursor: wait;
    }
    .offline-dl-btn svg {
      width: 15px;
      height: 15px;
      flex-shrink: 0;
    }
    .topbar__meta h1 {
      margin: 0;
      font-family: var(--font-display);
      font-size: 16px;
      font-weight: 600;
      letter-spacing: -0.02em;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .topbar__meta p {
      margin: 3px 0 0;
      font-size: 12px;
      color: var(--muted);
    }

    .live-pill {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      margin-left: 6px;
      padding: 2px 8px 2px 6px;
      border-radius: 999px;
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 0.04em;
      text-transform: uppercase;
      color: #7ddea0;
      background: rgba(125, 222, 160, 0.1);
      border: 1px solid rgba(125, 222, 160, 0.22);
      vertical-align: middle;
    }
    .live-pill::before {
      content: "";
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: #7ddea0;
      box-shadow: 0 0 10px #7ddea0;
      animation: pulse 2s ease infinite;
    }
    .offline-pill {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      margin-left: 6px;
      padding: 2px 8px;
      border-radius: 999px;
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 0.04em;
      text-transform: uppercase;
      color: #9eb4d4;
      background: rgba(158, 180, 212, 0.1);
      border: 1px solid rgba(158, 180, 212, 0.22);
      vertical-align: middle;
    }
    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.45; }
    }

    #layout {
      flex: 1;
      display: grid;
      grid-template-columns: 210px minmax(0, 1fr) 340px;
      min-height: 0;
    }

    .panel {
      background: var(--panel);
      border-color: var(--panel-border);
      backdrop-filter: blur(12px);
    }

    #snipTabs {
      border-right: 1px solid var(--panel-border);
      padding: 16px 12px;
      overflow: auto;
    }
    #snipTabs h2 {
      margin: 0 0 12px 6px;
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--faint);
    }
    .snip-tab {
      width: 100%;
      border: 1px solid transparent;
      background: rgba(255, 255, 255, 0.02);
      color: var(--text);
      border-radius: var(--radius-sm);
      padding: 8px;
      margin-bottom: 8px;
      cursor: pointer;
      text-align: left;
      transition: border-color 0.15s, background 0.15s, transform 0.15s;
    }
    .snip-tab:hover {
      background: rgba(255, 255, 255, 0.05);
      transform: translateY(-1px);
    }
    .snip-tab.active {
      border-color: rgba(232, 146, 58, 0.45);
      background: linear-gradient(145deg, rgba(232, 146, 58, 0.14), rgba(232, 146, 58, 0.05));
      box-shadow: 0 8px 24px rgba(0, 0, 0, 0.25);
    }
    .snip-tab img {
      width: 100%;
      border-radius: 6px;
      display: block;
      margin-bottom: 7px;
      background: #000;
      aspect-ratio: 16/10;
      object-fit: cover;
    }
    .snip-tab span { font-size: 12px; font-weight: 600; }

    .canvas-area {
      position: relative;
      display: flex;
      flex-direction: column;
      min-height: 0;
      background:
        linear-gradient(rgba(255, 255, 255, 0.025) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255, 255, 255, 0.025) 1px, transparent 1px),
        #0a0908;
      background-size: 28px 28px;
    }

    #viewport {
      flex: 1;
      overflow: hidden;
      position: relative;
      cursor: grab;
      min-height: 0;
    }
    #viewport.is-panning { cursor: grabbing; }
    #viewport.can-mark { cursor: crosshair; }

    .stage-wrap {
      position: absolute;
      top: 0;
      left: 0;
      transform-origin: 0 0;
      will-change: transform;
    }

    .stage {
      position: relative;
      border-radius: 6px;
      overflow: hidden;
      box-shadow:
        0 0 0 1px rgba(255, 255, 255, 0.06),
        0 32px 80px rgba(0, 0, 0, 0.55),
        0 8px 24px rgba(0, 0, 0, 0.35);
    }

    #shot {
      display: block;
      width: auto;
      height: auto;
      max-width: none;
      image-rendering: auto;
      -webkit-user-drag: none;
      user-select: none;
    }

    #overlay {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
    }

    .zoom-toolbar {
      position: absolute;
      left: 50%;
      bottom: 18px;
      transform: translateX(-50%);
      z-index: 5;
      display: flex;
      align-items: center;
      gap: 4px;
      padding: 6px 8px;
      border-radius: 999px;
      background: rgba(18, 16, 14, 0.88);
      border: 1px solid rgba(255, 255, 255, 0.1);
      backdrop-filter: blur(14px);
      box-shadow: 0 12px 40px rgba(0, 0, 0, 0.45);
    }
    .zoom-toolbar button {
      width: 34px;
      height: 34px;
      border: 0;
      border-radius: 999px;
      background: transparent;
      color: var(--text);
      font-size: 18px;
      font-weight: 500;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.12s;
    }
    .zoom-toolbar button:hover { background: rgba(255, 255, 255, 0.08); }
    .zoom-toolbar button.text-btn {
      width: auto;
      padding: 0 12px;
      font-size: 12px;
      font-weight: 700;
      letter-spacing: 0.02em;
    }
    #zoomLabel {
      min-width: 52px;
      text-align: center;
      font-size: 12px;
      font-weight: 600;
      color: var(--muted);
      font-variant-numeric: tabular-nums;
    }
    .zoom-divider {
      width: 1px;
      height: 20px;
      background: rgba(255, 255, 255, 0.1);
      margin: 0 4px;
    }
    .zoom-hint {
      position: absolute;
      top: 12px;
      left: 50%;
      transform: translateX(-50%);
      margin: 0;
      padding: 5px 12px;
      border-radius: 999px;
      font-size: 11px;
      color: var(--faint);
      background: rgba(12, 11, 10, 0.65);
      border: 1px solid rgba(255, 255, 255, 0.06);
      pointer-events: none;
      white-space: nowrap;
    }

    #sidebar {
      border-left: 1px solid var(--panel-border);
      display: flex;
      flex-direction: column;
      min-height: 0;
    }
    .sidebar-head {
      padding: 18px 18px 14px;
      border-bottom: 1px solid var(--panel-border);
    }
    .sidebar-head__row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
    }
    .sidebar-head h2 {
      margin: 0;
      font-family: var(--font-display);
      font-size: 15px;
      font-weight: 600;
    }
    .sidebar-toggle {
      flex-shrink: 0;
      padding: 5px 10px;
      border-radius: 999px;
      border: 1px solid var(--panel-border);
      background: rgba(255, 255, 255, 0.04);
      color: var(--muted);
      font: inherit;
      font-size: 11px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.12s, border-color 0.12s, color 0.12s;
    }
    .sidebar-toggle:hover {
      border-color: rgba(255, 255, 255, 0.14);
      color: var(--text);
    }
    .sidebar-toggle.is-off {
      color: var(--accent);
      border-color: rgba(232, 146, 58, 0.35);
      background: rgba(232, 146, 58, 0.1);
    }
    .sidebar-head p {
      margin: 7px 0 0;
      font-size: 12px;
      line-height: 1.5;
      color: var(--muted);
    }
    #noteList {
      flex: 1;
      overflow: auto;
      padding: 14px 14px 24px;
    }

    .note-card {
      display: flex;
      align-items: center;
      gap: 12px;
      border: 1px solid var(--panel-border);
      border-radius: var(--radius-sm);
      padding: 13px 12px;
      margin-bottom: 8px;
      cursor: pointer;
      background: rgba(255, 255, 255, 0.02);
      transition: border-color 0.15s, background 0.15s, box-shadow 0.15s;
    }
    .note-card:hover {
      border-color: rgba(255, 255, 255, 0.12);
      background: rgba(255, 255, 255, 0.04);
    }
    .note-card.active {
      border-color: rgba(43, 159, 255, 0.45);
      background: linear-gradient(135deg, rgba(43, 159, 255, 0.12), rgba(43, 159, 255, 0.03));
      box-shadow: inset 3px 0 0 var(--select);
    }
    .note-card__num {
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      width: 32px;
      height: 32px;
      border-radius: 9px;
      background: linear-gradient(145deg, #f0a04d, #d4762a);
      color: #fff8ef;
      font-size: 13px;
      font-weight: 800;
      box-shadow: 0 3px 10px var(--accent-glow);
    }
    .note-card.active .note-card__num {
      background: linear-gradient(145deg, #4db0ff, #1a8ae8);
      box-shadow: 0 3px 12px var(--select-glow);
    }
    .note-card__body {
      flex: 1;
      min-width: 0;
    }
    .note-card__body p {
      margin: 0;
      font-size: 13px;
      font-weight: 500;
      line-height: 1.45;
      color: rgba(246, 239, 230, 0.94);
    }
    .note-card__meta {
      display: inline-block;
      margin-top: 5px;
      padding: 2px 7px;
      border-radius: 999px;
      font-size: 10px;
      font-weight: 600;
      letter-spacing: 0.02em;
      color: var(--faint);
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid rgba(255, 255, 255, 0.06);
    }
    .note-card.active .note-card__meta {
      color: rgba(43, 159, 255, 0.85);
      border-color: rgba(43, 159, 255, 0.2);
      background: rgba(43, 159, 255, 0.08);
    }
    .note-card__zoom {
      flex-shrink: 0;
      width: 32px;
      height: 32px;
      margin-left: 2px;
      border: 0;
      border-radius: 8px;
      background: transparent;
      color: var(--faint);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 0;
      opacity: 0.55;
      transition: opacity 0.12s, background 0.12s, color 0.12s;
    }
    .note-card:hover .note-card__zoom,
    .note-card.active .note-card__zoom {
      opacity: 1;
    }
    .note-card__zoom:hover {
      background: rgba(232, 146, 58, 0.12);
      color: var(--accent);
    }
    .note-card.active .note-card__zoom:hover {
      background: rgba(43, 159, 255, 0.12);
      color: var(--select);
    }
    .note-card__zoom svg {
      width: 17px;
      height: 17px;
      pointer-events: none;
    }

    .overall {
      border: 1px dashed rgba(255, 255, 255, 0.1);
      border-radius: var(--radius-sm);
      padding: 12px 14px;
      margin-bottom: 14px;
      background: rgba(255, 255, 255, 0.02);
    }
    .overall h3 {
      margin: 0 0 6px;
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--faint);
    }
    .overall p { margin: 0; font-size: 13px; line-height: 1.55; }

    #loading, #error, #lockScreen {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 40px;
      text-align: center;
      color: var(--muted);
    }
    #loading[hidden], #error[hidden], #layout[hidden], #lockScreen[hidden] {
      display: none !important;
    }
    #error { color: #ff9b9b; }

    .lock-card {
      width: min(400px, 100%);
      padding: 32px 28px;
      border-radius: var(--radius);
      border: 1px solid var(--panel-border);
      background: var(--panel);
      text-align: center;
      box-shadow: 0 24px 60px rgba(0, 0, 0, 0.4);
    }
    .lock-card h2 {
      margin: 0 0 8px;
      font-family: var(--font-display);
      font-size: 22px;
    }
    .lock-card p { margin: 0 0 18px; color: var(--muted); font-size: 14px; line-height: 1.5; }
    .lock-card input {
      width: 100%;
      padding: 12px 14px;
      border-radius: var(--radius-sm);
      border: 1px solid var(--panel-border);
      background: #0a0908;
      color: var(--text);
      font: inherit;
      font-size: 15px;
      margin-bottom: 12px;
    }
    .lock-card button {
      width: 100%;
      padding: 12px 14px;
      border: 0;
      border-radius: var(--radius-sm);
      background: linear-gradient(180deg, #f0a04d, #c9782f);
      color: #fff8ef;
      font: inherit;
      font-size: 14px;
      font-weight: 700;
      cursor: pointer;
    }
    .lock-error { color: #ff9b9b; font-size: 13px; min-height: 18px; margin-top: 10px; }

    @media (max-width: 1100px) {
      #layout { grid-template-columns: 1fr; grid-template-rows: auto 1fr auto; }
      #snipTabs {
        display: flex;
        gap: 8px;
        overflow-x: auto;
        border-right: 0;
        border-bottom: 1px solid var(--panel-border);
      }
      #snipTabs h2 { display: none; }
      .snip-tab { min-width: 130px; flex-shrink: 0; }
      #sidebar { max-height: 38vh; }
      .zoom-hint { display: none; }
    }
  </style>
</head>
<body>
  <header class="topbar">
    <a class="brand" href="shot.html">
      <img src="logo-mark.png" alt="" width="30" height="30" />
      <span class="brand__text">Dexlyy<em>Shot</em> review</span>
    </a>
    <div class="topbar__right">
      <button type="button" id="downloadOfflineBtn" class="offline-dl-btn" title="Save a self-contained copy that works without internet">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <path d="M12 3v12"/>
          <path d="M7 10l5 5 5-5"/>
          <path d="M5 21h14"/>
        </svg>
        <span id="downloadOfflineLabel">Download for offline</span>
      </button>
      <div class="topbar__meta">
        <h1 id="boardTitle">Loading review…</h1>
        <p id="boardMeta"></p>
      </div>
    </div>
  </header>

  <div id="loading">Loading review board…</div>
  <div id="error" hidden></div>
  <div id="lockScreen" hidden>
    <div class="lock-card">
      <h2 id="lockTitle">Protected review</h2>
      <p>Enter the password your teammate shared separately from the link.</p>
      <input type="password" id="lockPassword" placeholder="Review password" autocomplete="current-password" />
      <button type="button" id="lockSubmit">View review</button>
      <p class="lock-error" id="lockError"></p>
    </div>
  </div>

  <div id="layout" class="panel" hidden>
    <nav id="snipTabs" aria-label="Screens in this review"></nav>

    <main id="canvasArea" class="canvas-area">
      <p class="zoom-hint">Scroll to zoom · drag to pan · double-click to fit</p>
      <div class="zoom-toolbar" id="zoomToolbar">
        <button type="button" id="zoomOut" title="Zoom out" aria-label="Zoom out">−</button>
        <span id="zoomLabel">Fit</span>
        <button type="button" id="zoomIn" title="Zoom in" aria-label="Zoom in">+</button>
        <span class="zoom-divider"></span>
        <button type="button" id="zoomFit" class="text-btn" title="Fit to view">Fit</button>
        <button type="button" id="zoom100" class="text-btn" title="Actual pixels (100%)">1:1</button>
      </div>
      <div id="viewport">
        <div id="stageWrap" class="stage-wrap">
          <div id="stage" class="stage">
            <img id="shot" alt="Review screenshot" draggable="false" />
            <canvas id="overlay"></canvas>
          </div>
        </div>
      </div>
    </main>

    <aside id="sidebar" class="panel">
      <div class="sidebar-head">
        <div class="sidebar-head__row">
          <h2>Review notes</h2>
          <button type="button" id="toggleNumbersBtn" class="sidebar-toggle" aria-pressed="true" title="Hide numbered pins on the screenshot">Numbers on</button>
        </div>
        <p>Click a note to highlight its marks. Use the zoom button to jump in on that area.</p>
      </div>
      <div id="noteList"></div>
    </aside>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="review-badges.js?v=7"></script>
  <script src="review.js?v=7"></script>
</body>
</html>
